name: Package and release

on:
  push:
    tags:
      - 'v*'

jobs:
  preflight:
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Lua 5.1
        shell: pwsh
        run: choco install lua51 -y --no-progress

      - name: Check release version
        shell: pwsh
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME

      - name: Lua syntax
        shell: pwsh
        run: luac5.1 -p ApplicantScout.lua libs\qrencode.lua

      - name: Package smoke
        shell: pwsh
        run: .\scripts\package-addon.ps1

  release:
    needs: preflight
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Refuse existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists; refusing to republish marketplace files."
            exit 1
          fi

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
