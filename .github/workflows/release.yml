name: Package and release

on:
  push:
    tags:
      - 'v*'

jobs:
  preflight:
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - name: Checkout addon
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: ApplicantScout-Addon

      - name: Verify release tag is reachable from origin/main
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Could not verify release tag ancestry: failed to fetch origin/main."
          }
          $ReleaseCommit = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $ReleaseCommit) {
            throw "Could not verify release tag ancestry: failed to resolve release commit."
          }
          $MainCommit = (git rev-parse refs/remotes/origin/main).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $MainCommit) {
            throw "Could not verify release tag ancestry: failed to resolve origin/main."
          }
          git merge-base --is-ancestor $ReleaseCommit $MainCommit
          $ExitCode = $LASTEXITCODE
          if ($ExitCode -eq 1) {
            throw "Release tag commit $ReleaseCommit is not reachable from origin/main ($MainCommit)."
          }
          if ($ExitCode -ne 0) {
            throw "Could not verify release tag ancestry: git merge-base exited $ExitCode."
          }
          Write-Host "Release tag commit $ReleaseCommit is reachable from origin/main ($MainCommit)."

      - name: Check release version
        id: version
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedCompanionRefOutputPath $env:GITHUB_OUTPUT

      - name: Wait for paired companion tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Ref = "${{ steps.version.outputs.companion_ref }}"
          $Deadline = (Get-Date).AddSeconds(120)
          do {
            gh api --silent "repos/Antrakt92/ApplicantScout-Companion/git/ref/tags/$Ref"
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Paired companion tag is available: $Ref"
              exit 0
            }
            if ((Get-Date) -ge $Deadline) {
              break
            }
            Start-Sleep -Seconds 5
          } while ($true)
          throw "Timed out waiting for paired companion tag: $Ref"

      - name: Checkout paired companion
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: Antrakt92/ApplicantScout-Companion
          ref: ${{ steps.version.outputs.companion_ref }}
          fetch-depth: 0
          path: ApplicantScout-Companion

      - name: Validate paired companion metadata
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedCompanionRoot ..\ApplicantScout-Companion

      - name: Set up Python
        # actions/setup-python v6 pinned to the upstream tag commit.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install -r constraints-release.txt
          .\.venv\Scripts\python -m pip install -e '.[dev]' -c constraints-release.txt

      - name: Install Lua 5.1
        shell: pwsh
        run: choco install lua51 --version=5.1.5 -y --no-progress

      - name: Install pinned LuaLS
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: |
          $Locks = Get-Content -LiteralPath scripts\tool-version-locks.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $Tool = $Locks.luaLanguageServer
          $Archive = Join-Path $env:RUNNER_TEMP "lua-language-server-$($Tool.version)-win32-x64.zip"
          $InstallRoot = Join-Path $env:RUNNER_TEMP "lua-language-server-$($Tool.version)"
          Invoke-WebRequest -Uri $Tool.windowsX64.url -OutFile $Archive
          $ActualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $Archive).Hash.ToLowerInvariant()
          if ($ActualHash -ne $Tool.windowsX64.sha256) {
            throw "LuaLS archive hash mismatch: $ActualHash"
          }
          Expand-Archive -LiteralPath $Archive -DestinationPath $InstallRoot -Force
          $LuaLS = Join-Path $InstallRoot "bin\lua-language-server.exe"
          if (-not (Test-Path -LiteralPath $LuaLS -PathType Leaf)) {
            throw "LuaLS archive is missing bin\lua-language-server.exe"
          }
          "APSCOUT_LUALS=$LuaLS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check addon Lua diagnostics
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-lua.ps1 -LuaLanguageServer $env:APSCOUT_LUALS

      - name: Check paired companion and addon contracts
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check.ps1 -AddonRoot ..\ApplicantScout-Addon -VisualMode Smoke

      - name: Development package smoke
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\package-addon.ps1 -OutputDir (Join-Path $env:RUNNER_TEMP "ApplicantScout-package-smoke")

      - name: Verify paired companion published release assets
        shell: pwsh
        working-directory: ApplicantScout-Addon
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -RequirePublishedPairedCompanionAssets -PublishedReleaseWaitSeconds 180

  marketplace-package:
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.marketplace-identity.outputs.commit }}
    steps:
      - name: Checkout addon for exact-tag marketplace package
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Record exact marketplace package commit
        id: marketplace-identity
        run: |
          commit=$(git rev-parse HEAD)
          if ! [[ "$commit" =~ ^[0-9a-f]{40}$ ]] || [ "$commit" != "$GITHUB_SHA" ]; then
            echo "::error::Marketplace dry run checkout $commit does not match tag event SHA $GITHUB_SHA."
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Build exact-tag marketplace package without uploading
        # BigWigsMods/packager v2 pinned to the same commit as the upload step.
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        with:
          args: -d
          pandoc: false

      - name: Validate exact-tag marketplace archive contract
        run: python3 scripts/check_addon_archive.py --release-dir .release

  release:
    needs: [preflight, marketplace-package]
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Verify release tag is reachable from origin/main
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          release_commit=$(git rev-parse HEAD)
          marketplace_commit="${{ needs.marketplace-package.outputs.commit }}"
          if ! [[ "$marketplace_commit" =~ ^[0-9a-f]{40}$ ]] || [ "$release_commit" != "$marketplace_commit" ]; then
            echo "::error::Release checkout $release_commit does not match the verified marketplace dry run $marketplace_commit."
            exit 1
          fi
          main_commit=$(git rev-parse refs/remotes/origin/main)
          set +e
          git merge-base --is-ancestor "$release_commit" "$main_commit"
          status=$?
          set -e
          if [ "$status" -eq 1 ]; then
            echo "::error::Release tag commit $release_commit is not reachable from origin/main ($main_commit)."
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "::error::Could not verify release tag ancestry: git merge-base exited $status."
            exit "$status"
          fi
          echo "Release tag commit $release_commit is reachable from origin/main ($main_commit)."

      - name: Refuse existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          error_file="$(mktemp)"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json tagName,isDraft,isPrerelease >/dev/null 2>"$error_file"; then
            echo "::error::Release $GITHUB_REF_NAME already exists; refusing to republish marketplace files."
            rm -f "$error_file"
            exit 1
          else
            status=$?
          fi
          error_text="$(tr -d '\r' < "$error_file")"
          rm -f "$error_file"
          if [ -n "$error_text" ] && ! grep -Eiq 'not found|no release found' <<< "$error_text"; then
            echo "::error::Could not determine whether release $GITHUB_REF_NAME already exists. $error_text"
            exit "$status"
          fi

      - name: Revalidate paired immutable release identity
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          .\scripts\check-release-version.ps1
          -Tag $env:GITHUB_REF_NAME
          -RequirePublishedPairedCompanionAssets
          -PublishedReleaseWaitSeconds 0

      - name: Package and release
        # BigWigsMods/packager v2 pinned to the peeled commit from the upstream tag.
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        with:
          pandoc: false
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

  verify-curseforge:
    needs: release
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # actions/setup-python v6 pinned to the upstream tag commit.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Verify CurseForge public release propagation
        run: >-
          python scripts/verify_curseforge_release.py
          --tag "$GITHUB_REF_NAME"
          --project-id 1541576
          --game-version 12.0.7
          --game-version 12.1.0
          --wait-seconds 900
