name: Package and release

on:
  push:
    tags:
      - 'v*'

env:
  APPLICANT_SCOUT_VISUAL_BASELINE: smoke

jobs:
  preflight:
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout addon
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: ApplicantScout-Addon

      - name: Check release version
        id: version
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedCompanionRefOutputPath $env:GITHUB_OUTPUT

      - name: Checkout paired companion
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: Antrakt92/ApplicantScout-Companion
          ref: ${{ steps.version.outputs.companion_ref }}
          fetch-depth: 0
          path: ApplicantScout-Companion

      - name: Validate paired companion metadata
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-release-version.ps1 -Tag $env:GITHUB_REF_NAME -PairedCompanionRoot ..\ApplicantScout-Companion

      - name: Set up Python
        # actions/setup-python v6 pinned to the upstream tag commit.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r constraints-release.txt
          .\.venv\Scripts\python -m pip install -e '.[dev]' -c constraints-release.txt

      - name: Install Lua 5.1
        shell: pwsh
        run: choco install lua51 --version=5.1.5 -y --no-progress

      - name: Check paired companion and addon contracts
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check.ps1 -AddonRoot ..\ApplicantScout-Addon

      - name: Development package smoke
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\package-addon.ps1 -OutputDir (Join-Path $env:RUNNER_TEMP "ApplicantScout-package-smoke")

  release:
    needs: preflight
    if: ${{ github.event.created == true && github.event.forced == false && github.event.deleted == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Refuse existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists; refusing to republish marketplace files."
            exit 1
          fi

      - name: Package and release
        # BigWigsMods/packager v2 pinned to the peeled commit from the upstream tag.
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
