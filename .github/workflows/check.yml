name: Check

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
    inputs:
      paired_companion_ref:
        description: Companion branch, tag, or commit to validate with this addon ref
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-2022
    steps:
      - name: Checkout addon
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: ApplicantScout-Addon

      - name: Checkout companion
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: Antrakt92/ApplicantScout-Companion
          ref: ${{ github.event.inputs.paired_companion_ref || 'main' }}
          fetch-depth: 0
          path: ApplicantScout-Companion

      - name: Set up Python
        # actions/setup-python v6 pinned to the upstream tag commit.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install -r constraints-release.txt
          .\.venv\Scripts\python -m pip install -e '.[dev]' -c constraints-release.txt

      - name: Install Lua 5.1
        shell: pwsh
        run: choco install lua51 --version=5.1.5 -y --no-progress

      - name: Install pinned LuaLS
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: |
          $Locks = Get-Content -LiteralPath scripts\tool-version-locks.json -Raw -Encoding UTF8 | ConvertFrom-Json
          $Tool = $Locks.luaLanguageServer
          $Archive = Join-Path $env:RUNNER_TEMP "lua-language-server-$($Tool.version)-win32-x64.zip"
          $InstallRoot = Join-Path $env:RUNNER_TEMP "lua-language-server-$($Tool.version)"
          Invoke-WebRequest -Uri $Tool.windowsX64.url -OutFile $Archive
          $ActualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $Archive).Hash.ToLowerInvariant()
          if ($ActualHash -ne $Tool.windowsX64.sha256) {
            throw "LuaLS archive hash mismatch: $ActualHash"
          }
          Expand-Archive -LiteralPath $Archive -DestinationPath $InstallRoot -Force
          $LuaLS = Join-Path $InstallRoot "bin\lua-language-server.exe"
          if (-not (Test-Path -LiteralPath $LuaLS -PathType Leaf)) {
            throw "LuaLS archive is missing bin\lua-language-server.exe"
          }
          "APSCOUT_LUALS=$LuaLS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check companion and addon contracts
        shell: pwsh
        working-directory: ApplicantScout-Companion
        run: .\scripts\check.ps1 -AddonRoot ..\ApplicantScout-Addon -VisualMode Smoke

      - name: Check addon Lua diagnostics
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\check-lua.ps1 -LuaLanguageServer $env:APSCOUT_LUALS

      - name: Development package smoke
        shell: pwsh
        working-directory: ApplicantScout-Addon
        run: .\scripts\package-addon.ps1 -OutputDir (Join-Path $env:RUNNER_TEMP "ApplicantScout-package-smoke")

  marketplace-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon for marketplace package
        # actions/checkout v6 pinned to the upstream tag commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Build marketplace package without uploading
        # BigWigsMods/packager v2 pinned to the same commit as release.yml.
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28
        with:
          args: -d
          pandoc: false

      - name: Validate marketplace archive contract
        run: python3 scripts/check_addon_archive.py --release-dir .release
